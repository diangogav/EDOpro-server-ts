services:
  postgres:
    image: postgres:16.11-alpine
    container_name: evolutionygo-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-evolution}
      POSTGRES_USER: ${POSTGRES_USER:-evolution}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-evolution} -d ${POSTGRES_DB:-evolution}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - evolutionygo-network

  valkey:
    image: valkey/valkey:9.0-alpine
    container_name: evolutionygo-valkey
    volumes:
      - valkey_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: valkey-server --appendonly yes
    networks:
      - evolutionygo-network

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: evolutionygo-server
    environment:
      NODE_ENV: production
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-evolution}
      POSTGRES_USER: ${POSTGRES_USER:-evolution}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      USE_REDIS: ${USE_REDIS:-true}
      REDIS_URI: redis://valkey:6379
      ADMIN_API_KEY: ${ADMIN_API_KEY:-changeme}
      RANK_ENABLED: ${RANK_ENABLED:-true}
      SEASON: ${SEASON:-1}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT: ${RATE_LIMIT:-100}
      RATE_LIMIT_WINDOW: ${RATE_LIMIT_WINDOW:-60000}
      HOST_PORT: ${HOST_PORT:-7911}
      MERCURY_PORT: ${MERCURY_PORT:-7711}
      HTTP_PORT: ${HTTP_PORT:-7922}
      WEBSOCKET_PORT: ${WEBSOCKET_PORT:-4000}
      RESOURCES_DIR: ./resources/current
      YGOPRO_FOLDERS: ./resources/current/ygopro/base,./resources/current/ygopro/ocg,./resources/current/ygopro/alternatives/edison,./resources/current/ygopro/alternatives/genesys,./resources/current/ygopro/alternatives/hat,./resources/current/ygopro/alternatives/jtp,./resources/current/ygopro/alternatives/md,./resources/current/ygopro/alternatives/tengu,./resources/current/ygopro/alternatives/world
      YGOPRO_EXTRA_FOLDERS: ./resources/current/ygopro/prereleases-cdb,./resources/current/ygopro/cards-art
      # WindBot (opt-in). The WindBot container is run separately (independent docker
      # command). Off by default — set these in .env to enable. WINDBOT_MY_IP must be a
      # host/IP the externally-run bot can reach back on; WINDBOT_ENDPOINT is the bot's HTTP API.
      ENABLE_WINDBOT: ${ENABLE_WINDBOT:-false}
      WINDBOT_ENDPOINT: ${WINDBOT_ENDPOINT:-}
      WINDBOT_MY_IP: ${WINDBOT_MY_IP:-windbot}
      WINDBOT_BOTLIST: ${WINDBOT_BOTLIST:-config/botlist.example.json}
    ports:
      - "${HOST_PORT:-7911}:${HOST_PORT:-7911}"
      - "${MERCURY_PORT:-7711}:${MERCURY_PORT:-7711}"
      - "${HTTP_PORT:-7922}:${HTTP_PORT:-7922}"
      - "${WEBSOCKET_PORT:-4000}:${WEBSOCKET_PORT:-4000}"
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - evolutionygo-network

volumes:
  postgres_data:
  valkey_data:

networks:
  evolutionygo-network:
    driver: bridge

