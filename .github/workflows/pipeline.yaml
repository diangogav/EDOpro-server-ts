name: PR Pipeline

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          submodules: true

      - name: Update submodules
        run: git submodule update --init --recursive

      - uses: actions/setup-node@v3
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Lint & format check
        run: npx biome ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
